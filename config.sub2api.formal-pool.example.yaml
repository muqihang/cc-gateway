# CC Gateway Configuration
# Copy to config.yaml and modify, or use: bash scripts/quick-setup.sh

server:
  port: 8443
  # TLS cert/key paths (required for remote deployment, not needed for localhost)
  # Generate self-signed: openssl req -x509 -newkey rsa:2048 -keyout certs/key.pem -out certs/cert.pem -days 365 -nodes
  # tls:
  #   cert: ./certs/cert.pem
  #   key: ./certs/key.pem

# Gateway mode:
# - sub2api: required for Sub2API formal-pool/shared-account production.
#   Sub2API selects the account and CC Gateway independently verifies the
#   attested account/credential/egress/persona/session context before egress.
mode: sub2api

# Upstream Anthropic API
upstream:
  url: https://api.anthropic.com

providers:
  anthropic: true

# OAuth is omitted in formal-pool sub2api mode. Sub2API selects the upstream
# credential and sends only the selected credential plus attested safe refs.

# Authentication - each client gets a unique token
# Generate tokens: bash scripts/add-client.sh <name>
auth:
  gateway_token: "change-me-gateway-token"
  internal_control_token: "change-me-independent-internal-control-token"
  tokens: []

# Canonical identity - all clients will appear as this single device
# Generate a fresh identity: npm run generate-identity
identity:
  # Process fallback only. Formal-pool account identity comes from account_identities.
  device_id: "aaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaaa"
  email: "redacted-email"

# Canonical environment fingerprint
# Should match a real machine's profile to look natural
env:
  platform: darwin
  platform_raw: darwin
  arch: arm64
  node_version: v24.3.0
  terminal: iTerm2.app
  package_managers: npm,pnpm
  runtimes: node
  is_running_with_bun: false
  is_ci: false
  is_claude_ai_auth: true
  # Claude Code 2.1.179 stable formal-pool production target.
  version: "2.1.179"
  version_base: "2.1.179"
  build_time: "2026-05-21T00:00:00Z"
  deployment_environment: unknown-darwin
  vcs: git

# System prompt environment masking
# These values replace the <env> block in the system prompt text.
# MUST be consistent with the env section above!
prompt_env:
  platform: darwin                    # Must match env.platform
  shell: zsh                          # Shell name shown in prompt
  os_version: "Darwin 24.4.0"        # uname -sr output
  working_dir: /Users/jack/projects   # Canonical home directory path prefix

# Canonical process metrics (should look like a real machine)
process:
  constrained_memory: 34359738368  # 32GB - pick a realistic value
  rss_range: [300000000, 500000000]  # 300-500MB realistic range
  heap_total_range: [40000000, 80000000]
  heap_used_range: [100000000, 200000000]

# Shared-pool Anthropic boundary. In sub2api mode these maps are required:
# missing account identity or missing/disabled/unknown egress bucket fails closed.
shared_pool:
  max_body_bytes: 16777216
  # Phase 0 selects protected_gateway for local capture/preflight only. There is
  # no implicit default. Production or real-canary fails closed with
  # protected_gateway_authority_unavailable until the Phase 4 policy broker is
  # locally verified. trusted_gateway is Phase 0 production-compatible only
  # when operators accept that a compromised Gateway is outside prevention.
  gateway_compromise_boundary: protected_gateway
  context_attestation_secret_ref: opaque:attestation-ref:v1:formal-pool
  # Default is strip. sign remains disabled until manually approved evidence gates pass.
  billing_cch_mode: strip
  signing_enabled: false
  # Preflight/local capture is the safe default. Real Anthropic canary also
  # requires ALLOW_REAL_ANTHROPIC_CANARY=1 and explicit user approval.
  upstream_mode: preflight
  real_canary_user_approved: false
  # Beta profile is an internal persona resolver input, not an official Claude
  # Code capability ceiling. Default formal-pool production to the verified
  # Claude Code 2.1.179 native degraded profile. Production attribution stays on
  # strip_attribution; no_cch and signed_cch require explicit 2.1.179
  # oracle/profile proof and an approved egress profile.
  # 2.1.191 latest is forward-compatibility evidence only and must not promote
  # production behavior.
  # Ordinary Haiku/Sonnet traffic is not forced into context-1m. Sub2API may
  # explicitly request context-1m with the internal x-sub2api-context-1m header
  # when the user selected a 1M model alias; CC Gateway then re-checks the model
  # allowlist and upgrades only that request to the verified subscription 1M
  # profile. 2.1.170, 2.1.150, and first_200_oauth_compat remain rollback aliases.
  # 2.1.171 was not published. Unknown beta values must go through candidate
  # allowlist + replay proof + kill switch + audit budget, and never bypass
  # trusted-client checks.
  message_beta_profile: claude_code_2_1_179_native_degraded
  canary_envelope_role: localhost_canary_guardrail_not_production_capability_ceiling
  # Canary-only safety envelope. These are local rollout guardrails, not
  # Claude Code official capability limits. They are meant for explicit
  # real-canary requests and should not be used to cap normal production
  # Claude Code ability; production should use adaptive quota/queue policy.
  canary_cost_envelope:
    enabled: false
    max_tokens: 32000
    max_body_bytes: 131072
    max_tools_count: 40
    allow_thinking: true
    max_thinking_budget_tokens: 32000
    allow_output_config: true
    allow_context_management: true
    allow_context_1m: false
    max_context_window_tokens: 1000000
    # Known Claude Code 1m-capable model families. Do not use this local
    # canary envelope to downgrade normal production capabilities; future
    # trusted Sonnet/Opus versions should enter the dynamic model resolver
    # candidate/gray path rather than being mechanically blocked.
    allowed_models:
      - "claude-sonnet-4-6"
      - "claude-opus-4-7"
      - "claude-opus-4-7-thinking"
      - "claude-opus-4-6"
      - "claude-opus-4-6-thinking"
      - "claude-haiku-4-5-20251001"
      - "claude-opus-4-8"
      - "claude-fable-5"
  # Future trusted Sonnet/Opus models must enter a candidate gray path rather
  # than being mechanically blocked or blindly trusted. These knobs are rollout
  # controls, not production capability downgrades.
  candidate_model_allowlist:
    - "claude-sonnet-4-8"
    - "claude-opus-4-8"
  candidate_model_replay_proofs:
    claude-sonnet-4-8: "fixture-sonnet-48"
    claude-opus-4-8: "fixture-opus-48"
  candidate_model_kill_switches:
    claude-sonnet-4-8: false
    claude-opus-4-8: false
  candidate_model_audit_budgets:
    claude-sonnet-4-8: 25
    claude-opus-4-8: 25
  candidate_beta_allowlist:
    - "claude_code_candidate_beta"
  candidate_beta_replay_proofs:
    claude_code_candidate_beta: "fixture-beta"
  candidate_beta_kill_switches:
    claude_code_candidate_beta: false
  candidate_beta_audit_budgets:
    claude_code_candidate_beta: 25
  # TLS profile authority is server-selected and fail-closed when enabled.
  # Keep disabled until deployed sidecar/profile equivalence is approved.
  egress_tls:
    enabled: false
    strict: true

# TLS profile registry contains safe refs only, never raw ClientHello, cipher,
# extension, key, cert, pcap, JA3 raw string, or operator secrets.
tls_profiles:
  claude-code-real-oracle-2179:
    profile_ref: tls-profile:claude-code-2.1.179-real-oracle-tcp-v1
    source: observed-oracle-63
    enabled: true

# Optional TLS-capable egress sidecar/connect-proxy. This is a local/loopback
# control plane and must not become an open proxy. Keep disabled unless the
# exact deployed sidecar and profile registry are verified. Never fall back to
# direct Node HTTPS when this path fails.
egress_tls_sidecar:
  enabled: false
  endpoint: http://127.0.0.1:18081
  control_token: "replace-with-independent-local-sidecar-control-token"
  proxy_binding_secret: "replace-with-independent-production-proxy-binding-secret"
  # Production mode requires this independent HMAC secret so CC Gateway and
  # the sidecar bind each request to the server-selected account proxy.
  # Logical provider host is used for SNI/Host. It is not a dial override.
  # Phase C CP2 found this logical-SNI requirement currently mismatches doc-63
  # TLS oracle summary, so this config must remain disabled until a new profile
  # plan resolves BLOCKED_TLS_ENGINE_MISMATCH.
  allowed_target_hosts: ["api.anthropic.com"]
  logical_target_host: "api.anthropic.com"
  allowed_routes: ["/v1/messages"]
  allowed_profile_refs:
    - tls-profile:claude-code-2.1.179-real-oracle-tcp-v1
  expected_tls_summary_bucket: tls-bucket:claude-code-real-oracle-2179

# Per selected upstream account identity, keyed by attested account_id.
# Values must be server-generated safe refs/HMACs. Never put raw account UUIDs,
# emails, API keys, OAuth tokens, proxy credentials, raw digests, prompts, bodies,
# telemetry, or CCH material here.
account_identities:
  example-account-id:
    device_id: "bbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbbb"
    account_uuid_ref: "opaque:account-ref:v1:example-account"
    email_ref: "opaque:email-ref:v1:example-account"
    account_ref: "opaque:account-partition:v1:example-account"
    credential_ref: "opaque:credential-ref:v1:example-credential"
    credential_binding_hmac: "hmac-sha256:dddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddddd"
    persona_variant: "claude-code-2.1.179-macos-local"
    session_policy: preserve_downstream_session_id
    policy_version: "2.1.179"

# Per-account/bucket egress isolation. proxy_url is operational config; logs and
# evidence must use proxy_identity_ref, never raw proxy credentials.
egress_buckets:
  example-bucket:
    enabled: true
    proxy_url: "http://127.0.0.1:8080"
    proxy_identity_ref: "opaque:proxy-ref:v1:example-bucket"
    allowed_account_ids: ["example-account-id"]
    tls_profile_ref: tls-profile:claude-code-2.1.179-real-oracle-tcp-v1

# Logging
logging:
  level: info  # debug | info | warn | error
  audit: true  # log which client made each request
